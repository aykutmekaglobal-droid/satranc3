<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satranç Saati</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080809;
  --red: #ff2442;
  --red-dim: #7a0f1e;
  --red-glow: rgba(255,36,66,0.35);
  --cyan: #00e8ff;
  --cyan-dim: #00596b;
  --cyan-glow: rgba(0,232,255,0.35);
  --text: #e8e0d5;
  --text-dim: #3a3530;
  --mid: #0f0f11;
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  overflow: hidden;
  font-family: 'IBM Plex Mono', monospace;
}

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── PLAYER PANELS ── */
.player {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  overflow: hidden;
  z-index: 1;
  gap: 6px;
  transition: background 0.3s;
  user-select: none;
}

/* Scanline texture */
.player::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px
  );
  pointer-events: none;
  z-index: 1;
}

/* Side accent bar */
.player::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 4px;
  transition: opacity 0.3s, box-shadow 0.3s;
  z-index: 2;
}

.player-1::after { left: 0; }
.player-2::after { right: 0; }

/* ── PLAYER 1 — RED ── */
.player-1 {
  background: linear-gradient(180deg, #120508 0%, #0d0305 100%);
  border-bottom: 1px solid #1a0a0d;
  transform: rotate(180deg);
}
.player-1::after { background: var(--red); box-shadow: 0 0 18px var(--red), 0 0 40px var(--red-glow); }
.player-1 .glow-ring { border-color: var(--red-dim); }

/* ── PLAYER 2 — CYAN ── */
.player-2 {
  background: linear-gradient(180deg, #020d0f 0%, #050f11 100%);
  border-top: 1px solid #061215;
}
.player-2::after { background: var(--cyan); box-shadow: 0 0 18px var(--cyan), 0 0 40px var(--cyan-glow); }
.player-2 .glow-ring { border-color: var(--cyan-dim); }

/* ── ACTIVE ── */
.player-1.active { background: linear-gradient(180deg, #1e0409 0%, #150306 100%); }
.player-1.active .glow-ring {
  border-color: var(--red);
  box-shadow: 0 0 0 1px var(--red-dim), 0 0 60px var(--red-glow), inset 0 0 80px rgba(255,36,66,0.07);
}
.player-1.active .timer { color: var(--red); text-shadow: 0 0 20px var(--red), 0 0 60px var(--red-glow), 0 0 100px rgba(255,36,66,0.2); }
.player-1.active .player-label { color: var(--red); text-shadow: 0 0 10px var(--red-glow); }

.player-2.active { background: linear-gradient(180deg, #030f12 0%, #02080a 100%); }
.player-2.active .glow-ring {
  border-color: var(--cyan);
  box-shadow: 0 0 0 1px var(--cyan-dim), 0 0 60px var(--cyan-glow), inset 0 0 80px rgba(0,232,255,0.07);
}
.player-2.active .timer { color: var(--cyan); text-shadow: 0 0 20px var(--cyan), 0 0 60px var(--cyan-glow), 0 0 100px rgba(0,232,255,0.2); }
.player-2.active .player-label { color: var(--cyan); text-shadow: 0 0 10px var(--cyan-glow); }

/* ── INACTIVE ── */
.player.inactive .timer { color: #1e1e22; text-shadow: none; }
.player.inactive .player-label { color: #1e1e22; }
.player.inactive .glow-ring { border-color: #111113; box-shadow: none; }
.player.inactive::after { opacity: 0.12; box-shadow: none; }

/* ── LOW TIME FLASH ── */
.player.low-time .timer { animation: danger-pulse 0.55s ease-in-out infinite; }
@keyframes danger-pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── GLOW RING ── */
.glow-ring {
  position: relative; z-index: 2;
  border: 1px solid;
  padding: 22px 52px;
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  transition: border-color 0.3s, box-shadow 0.3s;
  background: rgba(0,0,0,0.25);
}

/* ── CORNER MARKS ── */
.corner { position: absolute; width: 16px; height: 16px; z-index: 3; transition: border-color 0.3s; }
.corner.tl { top: 10px; left: 10px; border-top: 1px solid; border-left: 1px solid; }
.corner.tr { top: 10px; right: 10px; border-top: 1px solid; border-right: 1px solid; }
.corner.bl { bottom: 10px; left: 10px; border-bottom: 1px solid; border-left: 1px solid; }
.corner.br { bottom: 10px; right: 10px; border-bottom: 1px solid; border-right: 1px solid; }

.player-1 .corner { border-color: var(--red-dim); }
.player-1.active .corner { border-color: var(--red); }
.player-1.inactive .corner { border-color: #161618; }
.player-2 .corner { border-color: var(--cyan-dim); }
.player-2.active .corner { border-color: var(--cyan); }
.player-2.inactive .corner { border-color: #161618; }

/* ── PLAYER LABEL ── */
.player-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.35em; text-transform: uppercase;
  color: #222228; transition: color 0.3s, text-shadow 0.3s;
  position: relative; z-index: 2;
}

/* ── TIMER ── */
.timer {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(80px, 18vw, 128px);
  line-height: 0.88; letter-spacing: 0.04em;
  color: #1a1a1e;
  transition: color 0.3s, text-shadow 0.3s;
  position: relative; z-index: 2;
}

/* ── MOVES ── */
.moves {
  font-size: 10px; letter-spacing: 0.2em;
  color: #1e1e22; transition: color 0.3s;
  position: relative; z-index: 2;
}
.player-1.active .moves { color: var(--red-dim); }
.player-2.active .moves { color: var(--cyan-dim); }

/* ── PULSE DOT ── */
.pulse-dot {
  width: 6px; height: 6px; border-radius: 50%;
  opacity: 0; transition: opacity 0.3s; position: relative; z-index: 2;
}
.player-1 .pulse-dot { background: var(--red); box-shadow: 0 0 8px var(--red); }
.player-2 .pulse-dot { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
.active .pulse-dot { opacity: 1; animation: dot-blink 1s ease-in-out infinite; }
@keyframes dot-blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

/* ── CONTROL BAR ── */
.controls {
  height: 72px;
  background: var(--mid);
  border-top: 1px solid #1a1a1e;
  border-bottom: 1px solid #1a1a1e;
  display: flex; align-items: center;
  justify-content: center; gap: 0;
  flex-shrink: 0; position: relative; z-index: 10;
}

.controls::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -45deg, transparent, transparent 10px,
    rgba(255,255,255,0.012) 10px, rgba(255,255,255,0.012) 11px
  );
  pointer-events: none;
}

.btn {
  background: none; border: none;
  color: #2e2e34; cursor: pointer;
  padding: 8px 22px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; letter-spacing: 0.25em;
  text-transform: uppercase;
  transition: color 0.2s;
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  position: relative; z-index: 1;
}
.btn:hover { color: #777780; }
.btn:active { transform: scale(0.94); }
.btn svg { width: 20px; height: 20px; }
.btn-main { color: #4a4a54; padding: 8px 28px; }
.btn-main:hover { color: #aaaabc; }
.btn-main svg { width: 22px; height: 22px; }

.sep { width: 1px; height: 28px; background: #1a1a1e; }

.status-badge {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px; letter-spacing: 0.4em;
  color: #222228; pointer-events: none; z-index: 0;
  white-space: nowrap; opacity: 0; transition: opacity 0.3s;
}
.status-badge.show { opacity: 1; }

/* ── WIN OVERLAY ── */
.win-overlay {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 50; pointer-events: none;
  opacity: 0; transition: opacity 0.5s;
}
.win-overlay.show { opacity: 1; }

.win-box {
  text-align: center;
  background: rgba(8,8,9,0.95);
  border: 1px solid #2a2a30;
  padding: 36px 72px;
}
.win-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: 0.4em;
  text-transform: uppercase; color: #444450; margin-bottom: 12px;
}
.win-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 64px; letter-spacing: 0.1em; line-height: 1;
}
.win-name.red { color: var(--red); text-shadow: 0 0 30px var(--red-glow), 0 0 80px rgba(255,36,66,0.2); }
.win-name.cyan { color: var(--cyan); text-shadow: 0 0 30px var(--cyan-glow), 0 0 80px rgba(0,232,255,0.2); }
.win-sub { font-size: 9px; letter-spacing: 0.3em; color: #2a2a30; margin-top: 12px; text-transform: uppercase; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: #0c0c0e; border: 1px solid #222228;
  padding: 32px; min-width: 300px;
  transform: scale(0.96); transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: scale(1); }

.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 0.2em;
  color: var(--text); margin-bottom: 24px; text-align: center;
}
.preset-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 20px; }
.preset-btn {
  background: #111114; border: 1px solid #222228;
  color: #444450; padding: 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px; letter-spacing: 0.1em;
  cursor: pointer; transition: all 0.15s;
}
.preset-btn:hover { border-color: #444450; color: var(--text); }
.preset-btn.sel { border-color: #888890; color: var(--text); background: #18181c; }

.modal-label {
  font-size: 9px; letter-spacing: 0.3em;
  text-transform: uppercase; color: #2e2e34; margin-bottom: 8px;
}
.custom-row { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
.custom-row input {
  flex: 1; background: #111114; border: 1px solid #222228;
  color: var(--text); padding: 10px 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 16px; text-align: center; outline: none; min-width: 0;
}
.custom-row input:focus { border-color: #555560; }
.custom-row span { color: #333338; font-size: 11px; }

.modal-apply {
  width: 100%; background: var(--text); border: none;
  color: #080809; padding: 13px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px; letter-spacing: 0.25em;
  cursor: pointer; transition: opacity 0.2s;
}
.modal-apply:hover { opacity: 0.85; }
</style>
</head>
<body>

<div class="player player-1 inactive" id="p1" onclick="playerClick(1)">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="glow-ring">
    <div class="pulse-dot"></div>
    <div class="player-label">♟ Siyah</div>
    <div class="timer" id="p1-timer">10:00</div>
    <div class="moves" id="p1-moves">00 hamle</div>
  </div>
</div>

<div class="controls">
  <div class="status-badge" id="status-badge">— HAZIR —</div>

  <button class="btn" onclick="resetGame()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
    </svg>
    Sıfırla
  </button>

  <div class="sep"></div>

  <button class="btn btn-main" onclick="togglePause()" id="pause-btn">
    <svg id="pause-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="5 3 19 12 5 21 5 3"/>
    </svg>
    <span id="pause-label">Başlat</span>
  </button>

  <div class="sep"></div>

  <button class="btn" onclick="openModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    Süre
  </button>
</div>

<div class="player player-2 inactive" id="p2" onclick="playerClick(2)">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="glow-ring">
    <div class="pulse-dot"></div>
    <div class="player-label">♙ Beyaz</div>
    <div class="timer" id="p2-timer">10:00</div>
    <div class="moves" id="p2-moves">00 hamle</div>
  </div>
</div>

<div class="win-overlay" id="win-overlay">
  <div class="win-box">
    <div class="win-label">Kazanan</div>
    <div class="win-name" id="win-name">—</div>
    <div class="win-sub">Süre doldu · Sıfırlamak için Sıfırla'ya bas</div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Süre Kontrolü</div>
    <div class="modal-label">Hızlı Seçim</div>
    <div class="preset-grid">
      <button class="preset-btn" onclick="selectPreset(1)">1 dk</button>
      <button class="preset-btn" onclick="selectPreset(3)">3 dk</button>
      <button class="preset-btn" onclick="selectPreset(5)">5 dk</button>
      <button class="preset-btn sel" onclick="selectPreset(10)">10 dk</button>
      <button class="preset-btn" onclick="selectPreset(15)">15 dk</button>
      <button class="preset-btn" onclick="selectPreset(30)">30 dk</button>
    </div>
    <div class="modal-label">Özel Süre</div>
    <div class="custom-row">
      <input type="number" id="custom-min" min="1" max="180" value="10">
      <span>dakika</span>
    </div>
    <button class="modal-apply" onclick="applyTime()">UYGULA & SIFIRLA</button>
  </div>
</div>

<script>
  const actx = new (window.AudioContext || window.webkitAudioContext)();

  function playTick() {
    const o = actx.createOscillator(), g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type = 'sine'; o.frequency.value = 1100;
    g.gain.setValueAtTime(0.07, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.06);
    o.start(); o.stop(actx.currentTime + 0.06);
  }

  function playSwitch() {
    [[0, 500, 0.15, 0.05], [0.06, 1000, 0.18, 0.08]].forEach(([d, f, vol, dur]) => {
      const o = actx.createOscillator(), g = actx.createGain();
      o.connect(g); g.connect(actx.destination);
      o.type = 'square'; o.frequency.value = f;
      const t = actx.currentTime + d;
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.start(t); o.stop(t + dur);
    });
  }

  let totalSec = 600, p1t = 600, p2t = 600;
  let p1m = 0, p2m = 0, active = 0;
  let paused = true, over = false, ticker = null;

  const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  function render() {
    document.getElementById('p1-timer').textContent = fmt(p1t);
    document.getElementById('p2-timer').textContent = fmt(p2t);
    document.getElementById('p1-moves').textContent = String(p1m).padStart(2,'0') + ' hamle';
    document.getElementById('p2-moves').textContent = String(p2m).padStart(2,'0') + ' hamle';

    const p1 = document.getElementById('p1'), p2 = document.getElementById('p2');
    p1.className = 'player player-1'; p2.className = 'player player-2';

    if (over) { p1.classList.add('inactive'); p2.classList.add('inactive'); return; }

    if (active === 0) {
      p1.classList.add('inactive'); p2.classList.add('inactive');
    } else if (active === 1) {
      p1.classList.add('active'); p2.classList.add('inactive');
      if (p1t <= 30) p1.classList.add('low-time');
    } else {
      p2.classList.add('active'); p1.classList.add('inactive');
      if (p2t <= 30) p2.classList.add('low-time');
    }

    const badge = document.getElementById('status-badge');
    badge.className = 'status-badge';
    if (paused && active !== 0 && !over) { badge.textContent = '— DURAKLATILDI —'; badge.classList.add('show'); }
    else if (active === 0 && !over) { badge.textContent = '— HAZIR —'; badge.classList.add('show'); }
  }

  function endGame(loser) {
    over = true; clearInterval(ticker);
    const winner = loser === 1 ? 'BEYAZ' : 'SİYAH';
    const isRed = loser === 2;
    const wn = document.getElementById('win-name');
    wn.textContent = winner;
    wn.className = 'win-name ' + (isRed ? 'red' : 'cyan');
    document.getElementById('win-overlay').classList.add('show');
    render();
  }

  function tick() {
    if (paused || over || active === 0) return;
    if (active === 1) { p1t--; if (p1t <= 0) { p1t = 0; endGame(1); return; } }
    else { p2t--; if (p2t <= 0) { p2t = 0; endGame(2); return; } }
    playTick();
    render();
  }

  function playerClick(p) {
    if (over) return;
    if (active === 0) { active = p; paused = false; render(); return; }
    if (paused) { paused = false; render(); return; }
    if (active === p) {
      playSwitch();
      if (p === 1) { p1m++; active = 2; } else { p2m++; active = 1; }
      render();
    }
  }

  function togglePause() {
    if (over) return;
    if (active === 0) { active = 2; paused = false; }
    else paused = !paused;
    const icon = document.getElementById('pause-icon');
    const lbl = document.getElementById('pause-label');
    if (paused) {
      icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
      lbl.textContent = 'Devam';
    } else {
      icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      lbl.textContent = 'Duraklat';
    }
    render();
  }

  function resetGame() {
    clearInterval(ticker);
    p1t = totalSec; p2t = totalSec; p1m = 0; p2m = 0;
    active = 0; paused = true; over = false;
    document.getElementById('win-overlay').classList.remove('show');
    const icon = document.getElementById('pause-icon');
    const lbl = document.getElementById('pause-label');
    icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
    lbl.textContent = 'Başlat';
    render();
    ticker = setInterval(tick, 1000);
  }

  function openModal() { paused = true; render(); document.getElementById('modal').classList.add('open'); }
  function closeModal() { document.getElementById('modal').classList.remove('open'); }

  function selectPreset(m) {
    document.getElementById('custom-min').value = m;
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.classList.toggle('sel', parseInt(b.textContent) === m);
    });
  }

  function applyTime() {
    totalSec = (parseInt(document.getElementById('custom-min').value) || 10) * 60;
    closeModal(); resetGame();
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  ticker = setInterval(tick, 1000);
  render();
</script>
</body>
</html>
