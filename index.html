<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satranç Saati</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0e;
    --surface: #161618;
    --surface2: #1e1e21;
    --gold: #c9a84c;
    --gold-dim: #8a6f2e;
    --ivory: #f0e8d0;
    --ivory-dim: #8a8070;
    --danger: #c0392b;
    --danger-bright: #e74c3c;
    --white: #ffffff;
    --border: rgba(201,168,76,0.2);
    --border-bright: rgba(201,168,76,0.5);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .player {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.25s ease;
    border: none;
    outline: none;
    background: var(--surface);
    gap: 12px;
  }

  .player::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.04), transparent 60%);
    pointer-events: none;
  }

  .player-1 {
    transform: rotate(180deg);
    border-bottom: 1px solid var(--border);
  }

  .player-2 {
    border-top: 1px solid var(--border);
  }

  .player.active {
    background: var(--surface2);
    cursor: default;
  }

  .player.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 2px;
    background: var(--gold);
    border-radius: 2px 2px 0 0;
  }

  .player-1.active::after {
    bottom: auto;
    top: 0;
    border-radius: 0 0 2px 2px;
  }

  .player.inactive {
    opacity: 0.55;
    cursor: pointer;
  }

  .player.low-time {
    animation: pulse-danger 1s ease-in-out infinite;
  }

  @keyframes pulse-danger {
    0%, 100% { background: var(--surface2); }
    50% { background: rgba(192,57,43,0.15); }
  }

  .player-name {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ivory-dim);
  }

  .active .player-name {
    color: var(--gold);
  }

  .timer {
    font-family: 'DM Mono', monospace;
    font-size: clamp(64px, 14vw, 110px);
    font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--ivory);
    transition: color 0.3s;
  }

  .inactive .timer {
    color: var(--ivory-dim);
  }

  .low-time .timer {
    color: var(--danger-bright);
  }

  .move-count {
    font-size: 12px;
    color: var(--ivory-dim);
    letter-spacing: 0.15em;
  }

  .active .move-count {
    color: var(--gold-dim);
  }

  .turn-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .active .turn-indicator {
    opacity: 1;
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .controls {
    height: 80px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .btn {
    background: none;
    border: none;
    color: var(--ivory-dim);
    cursor: pointer;
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: color 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { color: var(--ivory); }
  .btn:active { transform: scale(0.96); }

  .btn svg {
    width: 22px;
    height: 22px;
  }

  .btn-primary svg { stroke: var(--gold); }
  .btn-primary { color: var(--gold); }
  .btn-primary:hover { color: var(--gold); opacity: 0.8; }

  .sep {
    width: 1px;
    height: 32px;
    background: var(--border);
    margin: 0 4px;
  }

  .time-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .time-modal.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    padding: 32px;
    min-width: 320px;
    transform: translateY(12px);
    transition: transform 0.25s;
  }

  .time-modal.open .modal-box {
    transform: translateY(0);
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin-bottom: 24px;
    text-align: center;
  }

  .presets {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .preset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--ivory);
    padding: 12px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .preset-btn:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  .preset-btn.selected {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.08);
  }

  .modal-label {
    font-size: 11px;
    color: var(--ivory-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .custom-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
  }

  .custom-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--ivory);
    padding: 10px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    border-radius: 3px;
    text-align: center;
    outline: none;
    min-width: 0;
  }

  .custom-row input:focus { border-color: var(--gold-dim); }
  .custom-row span { color: var(--ivory-dim); font-size: 12px; }

  .modal-apply {
    width: 100%;
    background: var(--gold);
    border: none;
    color: #1a1200;
    padding: 13px;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 3px;
    transition: opacity 0.2s;
  }

  .modal-apply:hover { opacity: 0.88; }

  .corner-deco {
    position: absolute;
    width: 24px;
    height: 24px;
    opacity: 0.4;
  }
  .corner-deco.tl { top: 8px; left: 8px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner-deco.tr { top: 8px; right: 8px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
  .corner-deco.bl { bottom: 8px; left: 8px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner-deco.br { bottom: 8px; right: 8px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

  .status-badge {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    padding: 6px 18px;
    border-radius: 2px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .status-badge.show { opacity: 1; }
</style>
</head>
<body>

<div class="player player-1 inactive" id="p1" onclick="playerClick(1)">
  <div class="corner-deco tl"></div>
  <div class="corner-deco tr"></div>
  <div class="corner-deco bl"></div>
  <div class="corner-deco br"></div>
  <div class="turn-indicator"></div>
  <div class="player-name" id="p1-name">Siyah</div>
  <div class="timer" id="p1-timer">10:00</div>
  <div class="move-count" id="p1-moves">0 hamle</div>
</div>

<div class="controls">
  <div class="status-badge" id="status-badge">Duraklatıldı</div>

  <button class="btn" onclick="resetGame()" title="Sıfırla">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </svg>
    Sıfırla
  </button>

  <div class="sep"></div>

  <button class="btn btn-primary" onclick="togglePause()" id="pause-btn" title="Başlat / Duraklat">
    <svg id="pause-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="5 3 19 12 5 21 5 3"/>
    </svg>
    <span id="pause-label">Başlat</span>
  </button>

  <div class="sep"></div>

  <button class="btn" onclick="openModal()" title="Süre Ayarla">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </svg>
    Süre
  </button>
</div>

<div class="player player-2 inactive" id="p2" onclick="playerClick(2)">
  <div class="corner-deco tl"></div>
  <div class="corner-deco tr"></div>
  <div class="corner-deco bl"></div>
  <div class="corner-deco br"></div>
  <div class="turn-indicator"></div>
  <div class="player-name" id="p2-name">Beyaz</div>
  <div class="timer" id="p2-timer">10:00</div>
  <div class="move-count" id="p2-moves">0 hamle</div>
</div>

<div class="time-modal" id="time-modal">
  <div class="modal-box">
    <div class="modal-title">Süre Kontrolü</div>

    <div class="modal-label">Hızlı Seçim</div>
    <div class="presets">
      <button class="preset-btn" onclick="selectPreset(1)">1 dk</button>
      <button class="preset-btn" onclick="selectPreset(3)">3 dk</button>
      <button class="preset-btn" onclick="selectPreset(5)">5 dk</button>
      <button class="preset-btn selected" onclick="selectPreset(10)">10 dk</button>
      <button class="preset-btn" onclick="selectPreset(15)">15 dk</button>
      <button class="preset-btn" onclick="selectPreset(30)">30 dk</button>
    </div>

    <div class="modal-label">Özel Süre (dakika)</div>
    <div class="custom-row">
      <input type="number" id="custom-min" min="1" max="180" value="10" placeholder="10">
      <span>dk</span>
    </div>

    <button class="modal-apply" onclick="applyTime()">Uygula & Sıfırla</button>
  </div>
</div>

<script>
  let totalSeconds = 600;
  let p1Time = 600;
  let p2Time = 600;
  let p1Moves = 0;
  let p2Moves = 0;
  let activePlayer = 0;
  let paused = true;
  let gameOver = false;
  let interval = null;
  let selectedPreset = 10;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }

  function render() {
    document.getElementById('p1-timer').textContent = fmt(p1Time);
    document.getElementById('p2-timer').textContent = fmt(p2Time);
    document.getElementById('p1-moves').textContent = p1Moves + ' hamle';
    document.getElementById('p2-moves').textContent = p2Moves + ' hamle';

    const p1el = document.getElementById('p1');
    const p2el = document.getElementById('p2');

    p1el.className = 'player player-1';
    p2el.className = 'player player-2';

    if (gameOver) {
      p1el.classList.add('inactive');
      p2el.classList.add('inactive');
      return;
    }

    if (activePlayer === 0) {
      p1el.classList.add('inactive');
      p2el.classList.add('inactive');
    } else if (activePlayer === 1) {
      p1el.classList.add('active');
      p2el.classList.add('inactive');
      if (p1Time <= 30) p1el.classList.add('low-time');
    } else {
      p2el.classList.add('active');
      p1el.classList.add('inactive');
      if (p2Time <= 30) p2el.classList.add('low-time');
    }

    const badge = document.getElementById('status-badge');
    badge.classList.toggle('show', paused && activePlayer !== 0);
  }

  function tick() {
    if (paused || gameOver || activePlayer === 0) return;
    if (activePlayer === 1) {
      p1Time--;
      if (p1Time <= 0) { p1Time = 0; endGame(1); }
    } else {
      p2Time--;
      if (p2Time <= 0) { p2Time = 0; endGame(2); }
    }
    render();
  }

  function endGame(loser) {
    gameOver = true;
    clearInterval(interval);
    const winner = loser === 1 ? 'Beyaz' : 'Siyah';
    const badge = document.getElementById('status-badge');
    badge.textContent = winner + ' Kazandı!';
    badge.classList.add('show');
    render();
  }

  function playerClick(p) {
    if (gameOver) return;
    if (activePlayer === 0) {
      activePlayer = p;
      paused = false;
      render();
      return;
    }
    if (paused) {
      paused = false;
      render();
      return;
    }
    if (activePlayer === p) {
      if (p === 1) { p1Moves++; activePlayer = 2; }
      else { p2Moves++; activePlayer = 1; }
      render();
    }
  }

  function togglePause() {
    if (gameOver) return;
    if (activePlayer === 0) {
      activePlayer = 2;
      paused = false;
    } else {
      paused = !paused;
    }
    const icon = document.getElementById('pause-icon');
    const label = document.getElementById('pause-label');
    if (paused || activePlayer === 0) {
      icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
      label.textContent = 'Devam';
    } else {
      icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      label.textContent = 'Duraklat';
    }
    render();
  }

  function resetGame() {
    clearInterval(interval);
    p1Time = totalSeconds;
    p2Time = totalSeconds;
    p1Moves = 0;
    p2Moves = 0;
    activePlayer = 0;
    paused = true;
    gameOver = false;
    const icon = document.getElementById('pause-icon');
    const label = document.getElementById('pause-label');
    icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
    label.textContent = 'Başlat';
    const badge = document.getElementById('status-badge');
    badge.textContent = 'Duraklatıldı';
    render();
    interval = setInterval(tick, 1000);
  }

  function openModal() {
    paused = true;
    render();
    document.getElementById('time-modal').classList.add('open');
  }

  function selectPreset(min) {
    selectedPreset = min;
    document.getElementById('custom-min').value = min;
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.classList.remove('selected');
      if (parseInt(b.textContent) === min) b.classList.add('selected');
    });
  }

  function applyTime() {
    const val = parseInt(document.getElementById('custom-min').value) || 10;
    totalSeconds = val * 60;
    document.getElementById('time-modal').classList.remove('open');
    resetGame();
  }

  document.getElementById('time-modal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });

  interval = setInterval(tick, 1000);
  render();
</script>
</body>
</html>
